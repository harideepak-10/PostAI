<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostAI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080810;
      --surface:   #10101c;
      --card:      #14142a;
      --border:    #1e1e3a;
      --primary:   #6366f1;
      --primary-h: #818cf8;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --radius:    14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
    }

    nav {
      display: flex;
      align-items: center;
      padding: 0 24px;
      height: 60px;
      border-bottom: 1px solid var(--border);
      background: rgba(8,8,16,.9);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 1.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #818cf8, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      align-items: start;
    }

    @media (max-width: 680px) {
      main { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }

    .panel-title {
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    textarea {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: .95rem;
      padding: 14px 16px;
      resize: none;
      outline: none;
      line-height: 1.6;
      transition: border-color .2s;
    }

    textarea:focus { border-color: var(--primary); }
    textarea::placeholder { color: var(--muted); }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 13px 20px;
      border: none;
      border-radius: 10px;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      margin-top: 12px;
      background: var(--primary);
      color: #fff;
    }

    .btn:hover { background: var(--primary-h); transform: translateY(-1px); }
    .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    .status {
      display: none;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: .85rem;
      margin-top: 12px;
      line-height: 1.5;
    }

    .status.info  { display: block; background: rgba(99,102,241,.15); color: #a5b4fc; border: 1px solid rgba(99,102,241,.3); }
    .status.error { display: block; background: rgba(239,68,68,.12); color: #fca5a5; border: 1px solid rgba(239,68,68,.25); }
    .status.ok    { display: block; background: rgba(34,197,94,.12); color: #86efac; border: 1px solid rgba(34,197,94,.25); }

    /* Captions */
    .captions-section { display: none; margin-top: 16px; }

    .caption-tabs { display: flex; gap: 4px; margin-bottom: 10px; }

    .caption-tab {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 5px 12px;
      border-radius: 6px;
      font-size: .8rem;
      cursor: pointer;
      transition: all .2s;
    }

    .caption-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    .caption-row {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 6px;
    }

    .copy-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: .78rem;
      cursor: pointer;
      transition: all .2s;
    }

    .copy-btn:hover { color: var(--text); border-color: var(--muted); }

    .caption-content {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      font-size: .85rem;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-wrap;
      max-height: 200px;
      overflow-y: auto;
    }

    /* Image preview */
    .image-box {
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      aspect-ratio: 4/5;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      color: var(--muted);
      font-size: .9rem;
      overflow: hidden;
      position: relative;
    }

    .image-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: var(--radius);
      cursor: pointer;
      transition: transform .3s;
    }

    .image-box img:hover { transform: scale(1.02); }
    .placeholder-icon { font-size: 2.5rem; opacity: .25; }

    .image-loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: rgba(10,10,20,.85);
      border-radius: var(--radius);
      color: var(--muted);
      font-size: .85rem;
    }

    .pulse-ring {
      width: 52px; height: 52px;
      border: 3px solid var(--primary);
      border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%   { transform: scale(.8); opacity: 1; }
      100% { transform: scale(1.6); opacity: 0; }
    }

    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .open-link {
      display: block;
      text-align: center;
      margin-top: 10px;
      color: var(--muted);
      font-size: .82rem;
      text-decoration: none;
    }

    .open-link:hover { color: var(--primary-h); }
  </style>
</head>
<body>

<nav>
  <div class="logo">&#10022; PostAI</div>
</nav>

<main>

  <!-- Left: Input + Captions -->
  <div>
    <div class="panel">
      <p class="panel-title">Describe your image</p>
      <textarea id="prompt" rows="6"
        placeholder="e.g. A futuristic electric car charging at night, neon city reflections on wet pavement, cinematic shot..."></textarea>

      <button class="btn" id="gen-btn" onclick="generate()">
        <span id="gen-btn-text">&#9654;&nbsp; Generate with FLUX</span>
      </button>

      <div id="status" class="status"></div>
    </div>

    <div id="captions-section" class="captions-section panel">
      <p class="panel-title">Captions</p>
      <div class="caption-tabs" id="caption-tabs"></div>
      <div class="caption-row">
        <button class="copy-btn" onclick="copyCaption()">Copy</button>
      </div>
      <div class="caption-content" id="caption-text"></div>
    </div>
  </div>

  <!-- Right: Image preview -->
  <div class="panel" style="padding:16px;">
    <p class="panel-title">Preview</p>
    <div class="image-box" id="image-box">
      <div class="placeholder-icon">&#128444;</div>
      <span>Your image will appear here</span>
    </div>
    <a id="open-link" class="open-link" href="#" target="_blank" style="display:none;">
      &#8599; Open full size
    </a>
  </div>

</main>

<script>
  let currentCaptions = {};
  let activeCaptionKey = "";

  async function generate() {
    const prompt = document.getElementById("prompt").value.trim();
    if (!prompt) { setStatus("Please enter a prompt first.", "error"); return; }

    const btn    = document.getElementById("gen-btn");
    const btnTxt = document.getElementById("gen-btn-text");
    const imgBox = document.getElementById("image-box");

    document.getElementById("captions-section").style.display = "none";
    document.getElementById("open-link").style.display = "none";
    btn.disabled = true;
    btnTxt.innerHTML = '<div class="spinner"></div> Generating…';
    setStatus("Sending to fal.ai FLUX — usually takes 15–30 seconds…", "info");

    imgBox.innerHTML = `
      <div class="image-loading">
        <div class="pulse-ring"></div>
        <span>Generating with FLUX…</span>
      </div>`;

    try {
      const res = await fetch("/api/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || "Server error " + res.status);
      }

      const data = await res.json();

      imgBox.innerHTML = `<img src="${esc(data.image_url)}" alt="Generated"
        onclick="window.open('${esc(data.image_url)}', '_blank')"
        title="Click to open full size" />`;

      const link = document.getElementById("open-link");
      link.href = data.image_url;
      link.style.display = "block";

      setStatus("✅ Done! Click the image to open full size.", "ok");

      if (data.captions && Object.keys(data.captions).length) {
        currentCaptions = data.captions;
        renderCaptions();
        document.getElementById("captions-section").style.display = "block";
      }

    } catch (e) {
      imgBox.innerHTML = `<div class="placeholder-icon">⚠️</div><span style="padding:0 16px;text-align:center;">${escHtml(e.message)}</span>`;
      setStatus("❌ " + e.message, "error");
    } finally {
      btn.disabled = false;
      btnTxt.innerHTML = "&#9654;&nbsp; Generate with FLUX";
    }
  }

  function renderCaptions() {
    const keys = Object.keys(currentCaptions);
    if (!keys.length) return;
    activeCaptionKey = keys[0];

    document.getElementById("caption-tabs").innerHTML = keys.map(k => `
      <button class="caption-tab ${k === activeCaptionKey ? "active" : ""}"
        onclick="selectCaption('${k}', this)">${k.charAt(0).toUpperCase() + k.slice(1)}</button>`
    ).join("");

    document.getElementById("caption-text").textContent = currentCaptions[activeCaptionKey] || "";
  }

  function selectCaption(key, el) {
    document.querySelectorAll(".caption-tab").forEach(t => t.classList.remove("active"));
    el.classList.add("active");
    activeCaptionKey = key;
    document.getElementById("caption-text").textContent = currentCaptions[key] || "";
  }

  function copyCaption() {
    const text = currentCaptions[activeCaptionKey];
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector(".copy-btn");
      const old = btn.textContent;
      btn.textContent = "Copied!";
      setTimeout(() => btn.textContent = old, 1500);
    });
  }

  function setStatus(msg, type) {
    const el = document.getElementById("status");
    el.textContent = msg;
    el.className = "status " + type;
  }

  function esc(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function escHtml(s) { return esc(s); }

  document.getElementById("prompt").addEventListener("keydown", e => {
    if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) generate();
  });
</script>

</body>
</html>
